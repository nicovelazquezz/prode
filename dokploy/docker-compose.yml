# Dokploy production stack for prode-backend.
#
# Env vars are populated from the Dokploy panel (NOT from the repo) — the
# `${VAR}` placeholders below are resolved at deploy time. Only POSTGRES_PASSWORD
# is required for both the postgres container and the backend's DATABASE_URL.
#
# Volumes are named so Dokploy can manage backups (Postgres → Backblaze B2).

services:
  prode-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prode
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: prode
      TZ: America/Argentina/Buenos_Aires
    volumes:
      - prode-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U prode']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  prode-redis:
    image: redis:7-alpine
    volumes:
      - prode-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  prode-wa-backend:
    image: prode-wa-backend:latest
    build:
      context: ./wa-backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3001
      WA_API_TOKEN: ${WHATSAPP_API_TOKEN}
      WA_AUTH_DIR: /app/data/auth
      WA_SEND_DELAY_MS: '500'
      WA_VERIFY_RECIPIENT: 'false'
      WA_RECONNECT_MAX_BACKOFF_MS: '60000'
      LOG_LEVEL: info
      TZ: America/Argentina/Buenos_Aires
    volumes:
      - prode-wa-data:/app/data
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/health']
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  prode-backend:
    image: prode-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://prode:${POSTGRES_PASSWORD}@prode-postgres:5432/prode
      REDIS_URL: redis://prode-redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN}
      MP_PUBLIC_KEY: ${MP_PUBLIC_KEY}
      MP_WEBHOOK_SECRET: ${MP_WEBHOOK_SECRET}
      WHATSAPP_API_URL: ${WHATSAPP_API_URL}
      WHATSAPP_API_TOKEN: ${WHATSAPP_API_TOKEN}
      ADMIN_WHATSAPP_NUMBER: ${ADMIN_WHATSAPP_NUMBER}
      EMAIL_FROM: ${EMAIL_FROM}
      RESEND_API_KEY: ${RESEND_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL}
      API_URL: ${API_URL}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY}
      SENTRY_DSN: ${SENTRY_DSN}
      ADMIN_DEFAULT_DNI: ${ADMIN_DEFAULT_DNI}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD}
    depends_on:
      prode-postgres:
        condition: service_healthy
      prode-redis:
        condition: service_healthy
      prode-wa-backend:
        condition: service_started
    restart: unless-stopped

  prode-frontend:
    image: prode-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* are inlined into the client bundle at build time, so they
      # must travel via build args (not just environment). Dokploy resolves
      # ${VAR} from the panel's environment for both build args and runtime
      # environment.
      args:
        NEXT_PUBLIC_API_URL: ${API_URL}
        NEXT_PUBLIC_FRONTEND_URL: ${FRONTEND_URL}
        NEXT_PUBLIC_WORLD_CUP_START: '2026-06-11T18:00:00-03:00'
        NEXT_PUBLIC_INSCRIPCION_PRECIO: ${INSCRIPCION_PRECIO}
        NEXT_PUBLIC_ADMIN_WHATSAPP: ${ADMIN_WHATSAPP_NUMBER}
        NEXT_PUBLIC_ENABLE_MOCK_CHECKOUT: 'false'
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY}
        NEXT_PUBLIC_SENTRY_DSN: ${SENTRY_DSN_FRONTEND}
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      TZ: America/Argentina/Buenos_Aires
      # Mirrored at runtime so the Next.js server (route handlers like
      # /api/health) can still reach the backend via SSR fetch.
      NEXT_PUBLIC_API_URL: ${API_URL}
      NEXT_PUBLIC_FRONTEND_URL: ${FRONTEND_URL}
      NEXT_PUBLIC_WORLD_CUP_START: '2026-06-11T18:00:00-03:00'
      NEXT_PUBLIC_INSCRIPCION_PRECIO: ${INSCRIPCION_PRECIO}
      NEXT_PUBLIC_ADMIN_WHATSAPP: ${ADMIN_WHATSAPP_NUMBER}
      NEXT_PUBLIC_ENABLE_MOCK_CHECKOUT: 'false'
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY}
      NEXT_PUBLIC_SENTRY_DSN: ${SENTRY_DSN_FRONTEND}
    depends_on:
      - prode-backend
    restart: unless-stopped

volumes:
  prode-pg-data:
  prode-redis-data:
  prode-wa-data:
